name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install zig
        if: matrix.archive != 'zip'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.archive != 'zip'
        run: cargo install cargo-zigbuild

      - name: Build release binary (zigbuild)
        if: matrix.archive != 'zip'
        run: cargo zigbuild --release -p echoax-cli --target ${{ matrix.target }}

      - name: Build release binary (Windows native)
        if: matrix.archive == 'zip'
        run: cargo build --release -p echoax-cli --target ${{ matrix.target }}

      - name: Package release (tar.gz)
        if: matrix.archive != 'zip'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="echoax-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE_NAME}"

          cp "target/${{ matrix.target }}/release/echo_access" "dist/${ARCHIVE_NAME}/"

          cp README.md LICENSE "dist/${ARCHIVE_NAME}/"

          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Package release (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          $archiveName = "echoax-${tag}-${{ matrix.target }}"
          $distDir = Join-Path "dist" $archiveName
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/echo_access.exe" $distDir
          Copy-Item "README.md", "LICENSE" $distDir
          $zipPath = Join-Path "dist" "${archiveName}.zip"
          Compress-Archive -Path (Join-Path $distDir "*") -DestinationPath $zipPath -Force
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          $sumLine = "${hash}  ${archiveName}.zip"
          $sumPath = "${zipPath}.sha256"
          Set-Content -Path $sumPath -Value $sumLine -Encoding utf8NoBOM

      - name: Upload artifacts (tar.gz)
        if: matrix.archive != 'zip'
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz*

      - name: Upload artifacts (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/*.zip*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create checksums file
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          sum_files=( *.sha256 )
          if [ ${#sum_files[@]} -eq 0 ]; then
            echo "checksums.sha256: no per-artifact .sha256 files found" >&2
            exit 1
          fi
          cat "${sum_files[@]}" > checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/checksums.sha256
